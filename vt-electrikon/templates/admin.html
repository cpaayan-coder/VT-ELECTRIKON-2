<!DOCTYPE html>
<html>

<head>

<title>Admin Panel</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-4">

<h1>Add Product</h1>

<form method="POST">

<input class="form-control mb-2" name="name" placeholder="Product Name">

<input class="form-control mb-2" name="brand" placeholder="Brand">

<input class="form-control mb-2" name="price" placeholder="Price">

<input class="form-control mb-2" name="stock" placeholder="Stock">

<input class="form-control mb-2" name="image" placeholder="Image Filename">

<button class="btn btn-success">Add Product</button>

</form>

</div>

</body>

</html>
