<!DOCTYPE html>
<html>

<head>

<title>VT Electrikon</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-4">

<h1 class="text-center">⚡ VT Electrikon Electronics Store</h1>

<div class="row">

{% for product in products %}

<div class="col-md-4">

<div class="card mb-4 shadow">

<img src="{{ url_for('static', filename='images/' + product[5]) }}">

<div class="card-body">

<h5>{{ product[1] }}</h5>

<p><b>Brand:</b> {{ product[2] }}</p>

<p><b>Price:</b> ₹{{ product[3] }}</p>

<p><b>Stock:</b> {{ product[4] }}</p>

{% if product[4] > 0 %}

<a href="/add_to_cart/{{ product[0] }}" class="btn btn-success w-100">
Add To Cart
</a>

{% else %}

<button class="btn btn-danger w-100" disabled>
Out Of Stock
</button>

{% endif %}

</div>

</div>

</div>

{% endfor %}

</div>

<a href="/cart" class="btn btn-primary">View Cart</a>
<a href="/admin" class="btn btn-dark">Admin Panel</a>

</div>

</body>

</html>
