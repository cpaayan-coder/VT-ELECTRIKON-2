<!DOCTYPE html>
<html>

<head>

<title>Cart</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">

</head>

<body class="bg-light">

<div class="container mt-4">

<h1>🛒 Shopping Cart</h1>

<table class="table">

<tr>
<th>Product</th>
<th>Price</th>
</tr>

{% for p in products %}

<tr>
<td>{{ p[1] }}</td>
<td>₹{{ p[3] }}</td>
</tr>

{% endfor %}

</table>

<a href="/" class="btn btn-primary">Continue Shopping</a>

</div>

</body>

</html>
